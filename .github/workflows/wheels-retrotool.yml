name: build-retrotool

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "retrotool/**"
      - "pyproject.toml"
      - ".github/workflows/wheels-retrotool.yml"
  pull_request:
    paths:
      - "retrotool/**"
      - "pyproject.toml"
      - ".github/workflows/wheels-retrotool.yml"
  workflow_dispatch:

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: retrotool-dist
          path: dist/*

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: retrotool-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
