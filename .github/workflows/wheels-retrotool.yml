name: build-retrotool

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "retrotool/**"
      - "pyproject.toml"
      - ".github/workflows/wheels-retrotool.yml"
  pull_request:
    paths:
      - "retrotool/**"
      - "pyproject.toml"
      - ".github/workflows/wheels-retrotool.yml"
  workflow_dispatch:

jobs:
  test:
    name: test suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install + test
        # Binary-wheel smoke tests (asar/bass/libsfx/xdelta) importorskip their
        # package, so they skip here — this gate covers the pure-Python suite.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          python -m pytest -q

  build:
    name: build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: retrotool-dist
          path: dist/*

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: retrotool-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
