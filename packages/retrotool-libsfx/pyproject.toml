[project]
name = "retrotool-libsfx"
version = "0.1.0"
description = "Bundled Optiroc SNES toolchain (libSFX, SuperFamiconv, ca65, SuperFamicheck, brrtools, lz4) for retrotool"
readme = "README.md"
authors = [{name = "Daniel Burgess", email = "daniel@herotechsys.com"}]
license = {text = "MIT AND Zlib AND BSD-2-Clause"}
requires-python = ">=3.12"
keywords = ["snes", "sfc", "libsfx", "superfamiconv", "ca65", "brrtools", "toolchain"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Software Development :: Assemblers",
    "Topic :: Software Development :: Build Tools",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["retrotool_libsfx"]

[tool.setuptools.package-data]
retrotool_libsfx = ["bin/*", "include/**/*", "examples/**/*", "licenses/*"]

[tool.cibuildwheel]
skip = ["pp*", "*-musllinux_*", "cp36-*", "cp37-*", "cp38-*", "cp39-*", "cp310-*", "cp311-*"]
build-verbosity = 1

[tool.cibuildwheel.linux]
before-all = "yum install -y gcc-c++ make cmake || { apt-get update && apt-get install -y g++ make cmake; }"
archs = ["x86_64", "aarch64"]

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

[tool.cibuildwheel.windows]
archs = ["AMD64"]
