[project]
name = "retrotool-xdelta"
version = "0.1.0"
description = "Bundled xdelta3 binary for retrotool mbuild diff generation"
readme = "README.md"
authors = [{name = "Daniel Burgess", email = "daniel@herotechsys.com"}]
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
keywords = ["xdelta", "xdelta3", "diff", "patch", "snes", "rom"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Build Tools",
    "Topic :: System :: Archiving :: Compression",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["retrotool_xdelta"]

[tool.setuptools.package-data]
retrotool_xdelta = ["bin/*", "licenses/*"]

[tool.cibuildwheel]
skip = ["pp*", "*-musllinux_*", "cp36-*", "cp37-*", "cp38-*", "cp39-*", "cp310-*", "cp311-*"]
build-verbosity = 1

[tool.cibuildwheel.linux]
before-all = "yum install -y gcc make autoconf automake libtool || { apt-get update && apt-get install -y gcc make autoconf automake libtool; }"
archs = ["x86_64", "aarch64"]

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

[tool.cibuildwheel.windows]
archs = ["AMD64"]
